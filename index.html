<!DOCTYPE html>
<html lang="pl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Scooter</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
color:white;
font-family:Arial, sans-serif;
overflow-x:hidden;
}

/* MENU */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 60px;
position:absolute;
top:0;
width:100%;
z-index:1000;
}

.logo{
font-size:32px;
font-weight:bold;
color:#a855f7;
letter-spacing:2px;
}

nav ul{
display:flex;
list-style:none;
gap:30px;
}

nav ul li a{
text-decoration:none;
color:white;
font-size:18px;
transition:0.3s;
}

nav ul li a:hover{
color:#a855f7;
}

/* HERO */

.hero{
height:100vh;
display:flex;
justify-content:space-between;
align-items:center;
padding:80px;
}

/* LEWA STRONA */

.left{
width:50%;
}

.left h1{
font-size:85px;
line-height:1.1;
margin-bottom:25px;
font-weight:900;
}

.purple{
color:#a855f7;
}

.left p{
font-size:24px;
color:#cfcfcf;
line-height:1.8;
max-width:700px;
}

/* PRZYCISKI */

.buttons{
margin-top:50px;
display:flex;
gap:20px;
flex-wrap:wrap;
}

.btn{
padding:18px 40px;
border-radius:15px;
text-decoration:none;
font-size:20px;
font-weight:bold;
transition:0.3s;
}

.buy{
background:#a855f7;
color:white;
}

.more{
border:1px solid #a855f7;
color:white;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 30px rgba(168,85,247,0.4);
}

/* PRAWA STRONA */

.right img{
width:700px;
max-width:100%;
filter:drop-shadow(0 0 50px rgba(168,85,247,0.25));
transition:0.3s;
}

.right img:hover{
transform:scale(1.02);
}

/* TELEFON */

@media(max-width:1000px){

.hero{
flex-direction:column;
text-align:center;
padding-top:140px;
}

.left{
width:100%;
}

.left h1{
font-size:55px;
}

.left p{
font-size:20px;
}

.buttons{
justify-content:center;
}

.right img{
margin-top:60px;
width:100%;
}

nav{
flex-direction:column;
gap:20px;
}

}

</style>
</head>

<body>

<!-- MENU -->

<nav>

<div class="logo">
PREMIUM
</div>

<ul>
<li><a href="">Start</a></li>
<li><a href="kursy.html">Kursy</a></li>
<li><a href="">Kontakt</a></li>
</ul>

</nav>

<!-- HERO -->

<section class="hero">

<div class="left">

<h1>
Premium <span class="purple">Scooter</span>
</h1>

<p>
Nowoczesne kursy jazdy, bezpieczeństwa
i obsługi hulajnóg elektrycznych
w premium stylu.
</p>

<div class="buttons">

<a href="kursy.html" class="btn buy">
Kup kurs
</a>

<a href="kursy.html" class="btn more">
Kursy
</a>

</div>

</div>

<div class="right">

<img src="Kukirin-G4-elektricni-skiro-promo4.webp">

</div>

</section>

</body>
</html>
