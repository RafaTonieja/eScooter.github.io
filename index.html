<!DOCTYPE html>
<html lang="pl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Scooter</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
color:white;
font-family:Arial, sans-serif;
overflow-x:hidden;
}

/* GŁÓWNA SEKCJA */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
}

/* ZDJĘCIE */

.hero img{
width:750px;
max-width:100%;
filter:drop-shadow(0 0 50px rgba(255,255,255,0.15));
transition:0.3s;
}

.hero img:hover{
transform:scale(1.02);
}

/* NAPIS */

.hero h1{
font-size:85px;
margin-top:30px;
font-weight:900;
letter-spacing:3px;
}

.hero p{
margin-top:25px;
font-size:24px;
color:#cfcfcf;
max-width:850px;
line-height:1.8;
}

/* PRZYCISKI */

.buttons{
margin-top:50px;
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

.btn{
padding:18px 40px;
border-radius:14px;
text-decoration:none;
font-size:20px;
font-weight:bold;
transition:0.3s;
}

.white{
background:white;
color:black;
}

.black{
border:1px solid white;
color:white;
}

.btn:hover{
transform:scale(1.05);
}

/* TELEFON */

@media(max-width:900px){

.hero h1{
font-size:50px;
}

.hero p{
font-size:20px;
}

.hero img{
width:100%;
}

.buttons{
flex-direction:column;
}

}

</style>
</head>

<body>

<section class="hero">

<img src="Kukirin-G4-elektricni-skiro-promo4.webp">

<h1>
PREMIUM SCOOTER
</h1>

<p>
Nowoczesne kursy jazdy, bezpieczeństwa
i obsługi hulajnóg elektrycznych.
</p>

<div class="buttons">

<a href="kursy.html" class="btn white">
Kup kurs
</a>

<a href="kursy.html" class="btn black">
Kursy
</a>

</div>

</section>

</body>
</html>
