<!DOCTYPE html>
<html lang="pl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KuKirin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
color:white;
font-family:Arial, sans-serif;
overflow-x:hidden;
}

/* MENU */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 70px;
background:#0a0a0a;
position:sticky;
top:0;
z-index:1000;
border-bottom:1px solid #161616;
}

.logo{
font-size:32px;
font-weight:900;
color:#a855f7;
letter-spacing:2px;
}

nav ul{
display:flex;
list-style:none;
gap:35px;
}

nav ul li a{
text-decoration:none;
color:white;
font-size:18px;
transition:0.3s;
}

nav ul li a:hover{
color:#a855f7;
}

/* HERO */

.hero{
display:flex;
justify-content:space-between;
align-items:center;
padding:60px 80px;
min-height:90vh;
}

/* LEWA */

.left{
width:50%;
}

.left h1{
font-size:85px;
line-height:1.05;
font-weight:900;
margin-bottom:25px;
}

.purple{
color:#a855f7;
}

.left p{
font-size:24px;
color:#bdbdbd;
line-height:1.8;
max-width:700px;
}

/* PRZYCISKI */

.buttons{
margin-top:45px;
display:flex;
gap:20px;
flex-wrap:wrap;
}

.btn{
padding:18px 38px;
border-radius:14px;
text-decoration:none;
font-size:20px;
font-weight:bold;
transition:0.3s;
}

.buy{
background:#a855f7;
color:white;
}

.more{
border:1px solid #a855f7;
color:white;
}

.btn:hover{
transform:translateY(-4px);
box-shadow:0 0 30px rgba(168,85,247,0.4);
}

/* PRAWA */

.right{
width:50%;
display:flex;
justify-content:center;
}

.right img{
width:1000px;
max-width:none;
filter:drop-shadow(0 0 60px rgba(168,85,247,0.25));
transition:0.3s;
}

.right img:hover{
transform:scale(1.02);
}

/* TELEFON */

@media(max-width:1100px){

.hero{
flex-direction:column;
text-align:center;
padding-top:120px;
}

.left{
width:100%;
}

.right{
width:100%;
margin-top:40px;
}

.left h1{
font-size:55px;
}

.left p{
font-size:20px;
}

.buttons{
justify-content:center;
}

.right img{
width:100%;
max-width:700px;
}

nav{
flex-direction:column;
gap:20px;
padding:25px;
}

}

</style>
</head>

<body>

<!-- MENU -->

<nav>

<div class="logo">
KuKirin
</div>

<ul>
<li><a href="">Start</a></li>
<li><a href="kursy.html">Kursy</a></li>
<li><a href="">Kontakt</a></li>
</ul>

</nav>

<!-- HERO -->

<section class="hero">

<div class="left">

<h1>
Nowoczesne <span class="purple">kursy</span><br>
hulajnóg
</h1>

<p>
Poznaj bezpieczeństwo jazdy,
technikę prowadzenia i obsługę
hulajnóg elektrycznych.
</p>

<div class="buttons">

<a href="kursy.html" class="btn buy">
Kup kurs
</a>

<a href="kursy.html" class="btn more">
Kursy
</a>

</div>

</div>

<div class="right">

<img src="Kukirin-G4-elektricni-skiro-promo4.webp">

</div>

</section>

</body>
</html>

href="kursy.html"
