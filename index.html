<!DOCTYPE html>
<html lang="pl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KuKirin G4</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#050505;
    color:white;
}

.hero{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:80px;
    min-height:100vh;
}

.left{
    width:50%;
}

.left h1{
    font-size:70px;
    line-height:1.1;
}

.green{
    color:#39ff14;
}

.left p{
    color:#cfcfcf;
    font-size:24px;
    line-height:1.7;
    margin-top:30px;
}

.button{
    display:inline-block;
    margin-top:40px;
    background:#39ff14;
    color:black;
    text-decoration:none;
    padding:18px 35px;
    border-radius:15px;
    font-size:22px;
    font-weight:bold;
}

.right img{
    width:700px;
    filter:drop-shadow(0 0 40px rgba(57,255,20,0.4));
}

@media(max-width:1000px){

.hero{
    flex-direction:column;
    text-align:center;
}

.left{
    width:100%;
}

.left h1{
    font-size:50px;
}

.right img{
    width:100%;
    margin-top:50px;
}

}

</head>

<body>

<section class="hero">

<div class="left">

<h1>

Profesjonalne kursy o hulajnogach elektrycznych.
Serwis, tuning i osiągi.
</p>

<a href="kursy.html" class="button">
Zobacz kursy
</a>

</div>

<div class="right">

</html>
